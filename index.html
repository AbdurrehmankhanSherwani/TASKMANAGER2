<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Task Manager</title>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>

<div class="container">
  <h1>Task Manager</h1>

  <form id="task-form">
    <label for="task-input">Task</label>

    <div class="task-entry">
      <input id="task-input" type="text" maxlength="120" placeholder="Enter a task"/>
      <button type="submit">Add Task</button>
    </div>

    <p id="task-error"></p>
  </form>

  <div class="filters">
    <button data-filter="all">All</button>
    <button data-filter="active">Active</button>
    <button data-filter="completed">Completed</button>
  </div>

  <p id="task-count">0 tasks remaining</p>
  <p id="empty-state">No tasks available.</p>

  <ul id="task-list"></ul>

  <button id="clear-completed">Clear Completed</button>

  <hr>

  <h2>AI Study Coach</h2>

  <textarea id="study-input" placeholder="Paste AI JSON here..." rows="6" style="width:100%;"></textarea>

  <br><br>

  <button id="parse-btn">Parse Plan</button>

  <p id="study-error" style="color:red;"></p>

  <div id="study-output"></div>
</div>

<script src="app.js"></script>

</body>
</html>
